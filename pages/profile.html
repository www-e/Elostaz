<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الملف الشخصي - مركز أ/ أشرف حسن للرياضيات</title>
    <link rel="icon" type="image/x-icon" href="../assets/icons/edu.ico">
    <link rel="shortcut icon" type="image/x-icon" href="../assets/icons/edu.ico">
    <link rel="apple-touch-icon" href="../assets/icons/edu.ico">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <link rel="stylesheet" href="../css/profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="../js/path-handler.js"></script>
    <script src="../js/pwa-updater.js"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light floating-nav">
        <div class="container">
            <a class="navbar-brand" href="../index.html">أ/ أشرف حسن</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">الرئيسية</a>
                    </li>
                </ul>
                <button id="logoutBtn" class="btn btn-outline-danger">
                    <i class="fas fa-sign-out-alt ms-2"></i>
                    تسجيل الخروج
                </button>
            </div>
        </div>
    </nav>

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" aria-label="Toggle Theme">
        <i class="fas fa-moon"></i>
    </button>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <h1>الملف الشخصي</h1>
                <div id="paymentStatus" class="payment-status">
                    <i class="fas fa-clock"></i>
                    <span>قيد الانتظار</span>
                </div>
            </div>

            <div class="profile-content">
                <div class="profile-info">
                    <div class="info-group">
                        <label>اسم الطالب</label>
                        <p id="studentName"></p>
                    </div>
                    <div class="info-group">
                        <label>رقم الطالب</label>
                        <p id="studentPhone"></p>
                    </div>
                    <div class="info-group">
                        <label>رقم ولي الأمر</label>
                        <p id="parentPhone"></p>
                    </div>
                    <div class="info-group">
                        <label>نوع الثانوية</label>
                        <p id="schoolType"></p>
                    </div>
                    <div class="info-group">
                        <label>نوع الحضور</label>
                        <p id="attendanceType"></p>
                    </div>
                </div>

                <div class="payment-section">
                    <h2>الدفع</h2>
                    <div class="qr-code">
                        <img src="../assets/qr/vodafone-cash.png" alt="Vodafone Cash QR Code">
                        <p>قم بمسح الكود QR للدفع عبر فودافون كاش</p>
                    </div>
                    <div class="upload-section">
                        <form id="paymentProofForm">
                            <div class="error-message"></div>
                            <div class="success-message"></div>
                            <div class="upload-area" id="uploadArea">
                                <div class="upload-default">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                    <p>اسحب وأفلت صورة إثبات الدفع هنا</p>
                                    <p>أو</p>
                                    <label for="paymentProof" class="upload-btn">اختر ملف</label>
                                    <input type="file" id="paymentProof" accept="image/*" hidden>
                                </div>
                                <div class="upload-preview">
                                    <img id="previewImage" src="" alt="Payment Proof Preview">
                                </div>
                                <button type="button" id="removeImage" class="remove-btn">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <button type="submit" class="submit-btn" disabled>
                                <i class="fas fa-upload ms-2"></i>
                                رفع إثبات الدفع
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/DOMloader.js" type="module"></script>
    <script src="../js/theme.js" type="module"></script>
    <script src="../js/profile/profile.js" type="module"></script>
</body>
</html>
